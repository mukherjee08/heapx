name: Sync to Public Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        if: github.repository == 'ivan121500/heapx'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false 

      - name: Push to public repository
        # This IF statement is the missing piece
        if: github.repository == 'ivan121500/heapx'
        env:
          DESTINATION_TOKEN: ${{ secrets.HEAPX }}
        run: |
          # 1. Scrub the default bot credentials
          git config --local --unset-all 'http.https://github.com/.extraheader' || true
          
          # 2. Set up the remote for the public account
          git remote add public https://mukherjee08:${DESTINATION_TOKEN}@github.com/mukherjee08/heapx.git
          
          # 3. Force push the code to the public repo
          git push public main --force
