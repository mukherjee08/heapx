name: Sync to Public Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # Important: Tells the bot not to save its own key

      - name: Push to public repository
        env:
          DESTINATION_TOKEN: ${{ secrets.HEAPX }}
        run: |
          # 1. Remove the 'extraheader' that GitHub Actions sets up by default
          # This is the "secret sauce" that stops the 403 error
          git config --local --unset-all 'http.https://github.com/.extraheader' || true
          
          # 2. Set up the remote with your professional account token
          git remote add public https://mukherjee08:${DESTINATION_TOKEN}@github.com/mukherjee08/heapx.git
          
          # 3. Force push to the public repo
          git push public main --force
