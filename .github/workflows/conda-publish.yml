name: Build and Upload to Anaconda.org

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Conda · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-14, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"

      - name: Install conda-build and anaconda-client
        shell: bash -el {0}
        run: conda install conda-build anaconda-client -y

      - name: Build conda package
        shell: bash -el {0}
        run: conda build conda-recipe --python ${{ matrix.python-version }}

      - name: Upload to Anaconda.org
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          PKG=$(conda build conda-recipe --python ${{ matrix.python-version }} --output)
          anaconda --token "$ANACONDA_API_TOKEN" upload --force "$PKG"
