<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeapX Papers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  #content { position: relative; z-index: 1; width: 100%; height: 100%; overflow-y: auto; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="content">
  <!-- Add page content here — it layers on top of the background -->
</div>

<script>
(() => {
  const canvas = document.getElementById('bg');
  const gl = canvas.getContext('webgl');
  if (!gl) return;

  const vsSource = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;

  const fsSource = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;

vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}
vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz;
  x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0,i1.y,1.))+i.x+vec3(0,i1.x,1.));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m;m=m*m;
  vec3 x=2.*fract(p*C.www)-1.;
  vec3 h=abs(x)-.5;
  vec3 ox=floor(x+.5);
  vec3 a0=x-ox;
  m*=1.79284291400159-.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

void main(){
  vec2 uv=(gl_FragCoord.xy-.5*u_res)/min(u_res.x,u_res.y);
  float t=u_time*.12; // very slow drift

  vec2 mouse=(u_mouse-.5*u_res)/min(u_res.x,u_res.y);
  float mouseDist=length(uv-mouse);
  float mouseInf=smoothstep(1.2,0.,mouseDist)*.18; // gentle, wide radius

  // Large, slow noise — broad soft blobs
  float n1=snoise(uv*.8+vec2(t*.4,t*.3));
  float n2=snoise(uv*1.1-vec2(t*.3,t*.5));
  float n3=snoise(uv*.6+vec2(n1,n2)*.3+mouse*.2);

  vec2 distort=vec2(n1,n2)*.07+vec2(n3)*.05;
  distort+=mouseInf*normalize(uv-mouse+.001)*.1;

  vec2 st=uv+distort;

  // Muted Miami palette on a near-black base
  vec3 base=vec3(.04,.02,.06);       // deep dark
  vec3 c1=vec3(.55,.08,.35);         // muted rose
  vec3 c2=vec3(.05,.35,.45);         // dark teal
  vec3 c3=vec3(.5,.15,.55);          // plum
  vec3 c4=vec3(.08,.22,.38);         // midnight blue
  vec3 c5=vec3(.55,.25,.1);          // dim amber

  float w1=snoise(st*.9+t*.25)*.5+.5;
  float w2=snoise(st*1.1-t*.2+3.)*.5+.5;
  float w3=snoise(st*.7+t*.3+7.)*.5+.5;

  vec3 col=mix(c1,c2,w1);
  col=mix(col,c3,w2*.5);
  col=mix(col,c4,w3*.4);
  col=mix(col,c5,smoothstep(.35,.65,snoise(st*1.2+t*.15+11.))*.25);

  // Blend onto dark base — color only emerges softly
  float intensity=smoothstep(-.3,.6,snoise(st*.7+t*.18+5.))*.45+.15;
  col=mix(base,col,intensity);

  // Soft mouse glow
  col+=vec3(.3,.12,.25)*mouseInf;

  // Deep vignette
  float vig=1.-dot(uv*.55,uv*.55);
  col*=smoothstep(0.,1.,vig);

  gl_FragColor=vec4(col,1.);
}
`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsSource));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, 'u_res');
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  let mx = 0, my = 0, tmx = 0, tmy = 0;

  window.addEventListener('mousemove', e => { tmx = e.clientX; tmy = e.clientY; });
  window.addEventListener('touchmove', e => {
    e.preventDefault();
    tmx = e.touches[0].clientX;
    tmy = e.touches[0].clientY;
  }, { passive: false });

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
  }
  window.addEventListener('resize', resize);
  resize();

  const t0 = performance.now();

  (function loop() {
    // Smooth mouse follow
    mx += (tmx * (window.devicePixelRatio || 1) - mx) * .03;
    my += ((window.innerHeight - tmy) * (window.devicePixelRatio || 1) - my) * .03;

    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (performance.now() - t0) / 1000);
    gl.uniform2f(uMouse, mx, my);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
