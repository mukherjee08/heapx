{% set name = "heapx" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools >=61
    - setuptools-scm >=6.0
    - wheel
  run:
    - python

test:
  imports:
    - heapx
  commands:
    - python -c "import heapx; assert heapx.__version__.startswith('1.')"
    - python -c "import heapx; d=[5,2,8,1,9]; heapx.heapify(d); assert d[0]==1"
    - python -c "import heapx; d=[1,3,5]; heapx.push(d,2); assert 2 in d"
    - python -c "import heapx; d=[1,2,3,4,5]; heapx.heapify(d); assert heapx.pop(d)==1"
    - python -c "import heapx; d=[1,2,3]; heapx.heapify(d); heapx.remove(d,indices=0); assert 1 not in d"
    - python -c "import heapx; d=[1,2,3]; heapx.heapify(d); heapx.replace(d,9,indices=0); assert 9 in d"
    - python -c "import heapx; r=heapx.merge([1,3],[2,4]); assert len(r)==4"
  requires:
    - pytest >=6.0

about:
  home: https://github.com/ivan121500/heapx
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Ultra-optimized heap operations with comprehensive functionality and superior performance
  description: |
    heapx is a compact C-level Python extension engineered to deliver faster
    execution and memory-efficient heap operations through deliberate,
    performance-driven implementation choices. Features include specialized
    arities (binary, ternary, quaternary, n-ary), SIMD/homogeneity detection,
    precomputed key caching, advanced prefetching, and a small-object key pool.
    
    Key features:
    - Native min-heap and max-heap support without data transformation
    - N-ary heap support (binary, ternary, quaternary, and arbitrary arity)
    - Custom comparison functions with intelligent key caching
    - 40-80% performance improvement over heapq for large datasets
    - Advanced C-level optimizations including SIMD, prefetching, and fast comparison paths
    - Comprehensive API with heapify, push, pop, remove, replace, and merge operations
    - Floyd's bottom-up heapify algorithm for O(n) heap construction
    - 11-priority dispatch table for automatic algorithm selection
    - Small-heap specialization with insertion sort fallback for n <= 16
  dev_url: https://github.com/ivan121500/heapx
  doc_url: https://github.com/ivan121500/heapx

extra:
  recipe-maintainers:
    - ivan121500
