{% set name = "heapx" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mukherjee08/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 17785a97315d712eeca042b7413e6f269adbc3e936d16c520e98decba1d1ffe0

build:
  number: 0
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools >=61
    - setuptools-scm >=6.0
    - wheel
  run:
    - python

test:
  imports:
    - heapx
  commands:
    - python -c "import heapx; assert heapx.__version__.startswith('1.')"
    - python -c "import heapx; d=[5,2,8,1,9]; heapx.heapify(d); assert d[0]==1"
    - python -c "import heapx; d=[1,3,5]; heapx.push(d,2); assert 2 in d"
    - python -c "import heapx; d=[1,2,3,4,5]; heapx.heapify(d); assert heapx.pop(d)==1"
    - python -c "import heapx; d=[1,2,3]; heapx.heapify(d); heapx.remove(d,indices=0); assert 1 not in d"
    - python -c "import heapx; d=[1,2,3]; heapx.heapify(d); heapx.replace(d,9,indices=0); assert 9 in d"
    - python -c "import heapx; r=heapx.merge([1,3],[2,4]); assert len(r)==4"
  requires:
    - pytest >=6.0

about:
  home: https://mukherjee08.github.io/heapx
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Ultra-optimized heap operations for Python, written in C.
  description: |
    heapx is a single-file C extension for Python that implements heap
    operations with explicit, performance-driven design choices at every
    level of the implementation. The module provides six public API
    functions — heapify, push, pop, remove, replace, and merge — each
    backed by a multi-tier dispatch system that selects the optimal
    algorithm at runtime based on data structure type, heap size, arity,
    key function presence, element type homogeneity, and GIL-release
    eligibility.
  dev_url: https://github.com/mukherjee08/heapx
  doc_url: https://mukherjee08.github.io/heapx/readme.html

extra:
  recipe-maintainers:
    - mukherjee08
